<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>arca — social card</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{width:1200px;height:630px;overflow:hidden;font-family:Quicksand,sans-serif;
    background:#FBF8F1; background-image:radial-gradient(900px 500px at 28% -120px,#E8F5F2,transparent 70%);
    display:flex;align-items:center;gap:50px;padding:0 84px;color:#273a38}
  .logo{width:320px;height:320px;flex:none;filter:drop-shadow(0 22px 30px rgba(31,91,87,.28))}
  h1{font-size:118px;font-weight:700;color:#1f5b57;letter-spacing:-2px;line-height:.9;margin-bottom:10px}
  .tag{font-size:40px;font-weight:500;max-width:13ch;line-height:1.18}
  .tag b{color:#d97560}
  .pill{display:inline-block;margin-top:30px;font-family:"JetBrains Mono",monospace;font-size:27px;
    color:#1f5b57;background:#fff;border:3px solid #8FCEC8;border-radius:999px;padding:12px 26px}
  .pill .d{color:#EC8B77}
  .foot{margin-top:22px;color:#6a8682;font-size:23px;font-weight:600}
  .spark{position:absolute;color:#8FCEC8;font-size:40px}
</style>
</head>
<body>
  <span class="spark" style="left:60px;top:70px">✦</span>
  <span class="spark" style="right:90px;bottom:80px;color:#f3a693;font-size:30px">✦</span>
  <img class="logo" src="arca-light.png" alt="">
  <div>
    <h1>arca</h1>
    <div class="tag">age-encrypted secrets, kept <b>safely in front of AI agents</b></div>
    <div class="pill"><span class="d">$</span> brew install arenzana/tap/arca</div>
    <div class="foot">MIT · cosign-signed releases with SLSA provenance</div>
  </div>
</body>
</html>
