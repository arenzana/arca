name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write      # publish the GitHub release
  id-token: write      # cosign keyless signing + provenance (OIDC)
  attestations: write  # SLSA build-provenance attestations

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # GitHub-native build provenance for every released artifact.
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'dist/*.tar.gz'
