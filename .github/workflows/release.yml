name: release

on:
  push:
    tags: ['v*']

# A single tag push has been observed to deliver the push event twice (v0.6.1: two runs, same
# commit, one second apart). With no guard, two goreleaser runs raced: each built independently and
# — because the archives are not byte-reproducible — produced different checksums, so the GitHub
# release ended up with one build's assets while the Homebrew cask got the other's, breaking
# `brew upgrade` on a SHA-256 mismatch. Serialize by tag ref and cancel any older run of the same
# tag, so exactly one build ever publishes a given tag. Distinct tags use distinct groups, so a
# normal sequence of releases is unaffected; only a duplicate of the *same* tag is cancelled.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# Least privilege at the top level; the release job elevates only what it needs.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # publish the GitHub release
      id-token: write      # cosign keyless signing + provenance (OIDC)
      attestations: write  # SLSA build-provenance attestations
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          # Audit mode records every egress without blocking. Switch to `egress-policy: block`
          # with a verified allowlist (Go toolchain, GoReleaser/GitHub, Sigstore, and the
          # download-syft host) once captured from this run's harden-runner insights — going
          # straight to block broke the release on an unlisted syft download host.
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      # Require a green build before releasing: never ship signed artifacts from a commit whose
      # tests fail or that has a newly-disclosed vulnerability.
      - name: verify before release
        run: |
          go vet ./...
          go test ./...
          go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Always set (empty if the secret is absent) so the goreleaser cask/scoop templates
          # resolve; the skip_upload guards then no-op the push when a token is empty.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_GITHUB_TOKEN: ${{ secrets.SCOOP_GITHUB_TOKEN }}
      # GitHub-native build provenance for every released artifact. Best-effort: every asset is
      # already cosign-signed (the primary signature), so a transient Sigstore/Rekor outage must
      # not strand a fully-built, signed release as an unpublished draft. continue-on-error lets
      # the publish step below run regardless; re-attest out-of-band if a run's provenance is missed.
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        continue-on-error: true
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
      # Publish now that every asset is built and cosign-signed (provenance attested best-effort
      # above). With immutable releases enabled, publishing locks the tag + assets, so this is last.
      - name: publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --repo "${GITHUB_REPOSITORY}"
      # Guardrail: confirm the Homebrew cask goreleaser just pushed to the tap carries the same
      # checksums as the release assets we just published (both come from this one build, so within
      # a single run they must match). This turns a silent divergence — the class of failure that
      # shipped a broken v0.6.1 cask — into an immediate red release instead of a user's failed
      # `brew upgrade`. Skipped when no tap token is configured (the cask isn't pushed then).
      - name: verify the published cask matches the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "no tap token configured — goreleaser did not push a cask; skipping cask verification"
            exit 0
          fi
          ver="${GITHUB_REF_NAME#v}"
          # The tap push can lag a few seconds behind goreleaser; retry until the cask shows this version.
          cask=""
          for _ in 1 2 3 4 5 6; do
            cask=$(gh api "repos/${GITHUB_REPOSITORY_OWNER}/homebrew-tap/contents/Casks/arca.rb" --jq '.content' 2>/dev/null | base64 -d || true)
            grep -q "version \"${ver}\"" <<<"$cask" && break
            sleep 5
          done
          grep -q "version \"${ver}\"" <<<"$cask" || { echo "::error::could not read the ${ver} cask from the tap"; exit 1; }
          fail=0
          for plat in darwin_amd64 darwin_arm64 linux_amd64 linux_arm64; do
            want=$(awk -v f="arca_${ver}_${plat}.tar.gz" '$2==f{print $1}' dist/checksums.txt)
            # In the cask the sha256 line precedes the matching url line.
            got=$(grep -B1 "arca_#{version}_${plat}.tar.gz" <<<"$cask" | grep -oiE '[0-9a-f]{64}' | head -1 || true)
            if [ -z "$want" ] || [ "$want" != "$got" ]; then
              echo "::error::cask ${plat} checksum '${got:-<none>}' != release '${want:-<none>}'"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "cask checksums match the published release ✓"
