name: release

on:
  push:
    tags: ['v*']

# Least privilege at the top level; the release job elevates only what it needs.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # publish the GitHub release
      id-token: write      # cosign keyless signing + provenance (OIDC)
      attestations: write  # SLSA build-provenance attestations
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          # Block egress on the privileged, OIDC-signing release job. The allowlist covers the
          # Go toolchain, GoReleaser/GitHub, and Sigstore (cosign/Fulcio/Rekor/TUF). If a real
          # release ever needs another host, harden-runner names the blocked endpoint and the
          # release fails closed (an unpublished draft) — add it here, nothing ships broken.
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            fulcio.sigstore.dev:443
            github.com:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            release-assets.githubusercontent.com:443
            rekor.sigstore.dev:443
            storage.googleapis.com:443
            sum.golang.org:443
            token.actions.githubusercontent.com:443
            tuf-repo-cdn.sigstore.dev:443
            uploads.github.com:443
            vuln.go.dev:443
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      # Require a green build before releasing: never ship signed artifacts from a commit whose
      # tests fail or that has a newly-disclosed vulnerability.
      - name: verify before release
        run: |
          go vet ./...
          go test ./...
          go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # GitHub-native build provenance for every released artifact.
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
      # Publish only now that every asset and attestation is in place. With immutable
      # releases enabled, publishing locks the tag + assets, so this must be the last step.
      - name: publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --repo "${GITHUB_REPOSITORY}"
