name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
      - run: go mod verify
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build ./...

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: CycloneDX/gh-gomod-generate-sbom@v2
        with:
          version: latest
          args: mod -licenses -json -output arca.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: arca.cdx.json
