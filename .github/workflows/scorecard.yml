name: scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '27 3 * * 1'   # weekly Monday
  push:
    branches: [main]
  workflow_dispatch:        # allow on-demand runs (e.g. right after a release)

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read          # checkout (job-level perms replace the workflow default)
      security-events: write  # upload SARIF to code scanning
      id-token: write         # publish results to the OpenSSF API
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
          # PAT (repo + admin:read) so the Branch-Protection check can read protection settings,
          # which the default GITHUB_TOKEN cannot.
          repo_token: ${{ secrets.SCORECARD_TOKEN }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
      - uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v3
        with:
          sarif_file: results.sarif
