# Exercises the release signing path without publishing anything: goreleaser snapshot
# build, keyless cosign signature over the checksums (same args as .goreleaser.yaml
# `signs`), then verification. Run this after bumping the cosign/goreleaser toolchain —
# the real release workflow only fires on tags, so those bumps are otherwise untested
# until a release is already in flight.
name: release-dryrun

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dryrun:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # cosign keyless signing (OIDC)
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: '~> v2'
          args: release --snapshot --clean
        env:
          # Deliberately empty, mirroring release.yml: the cask/scoop skip_upload
          # templates need the keys to exist, and empty means "build, don't push".
          # Never real secrets here — the dry-run must not be able to publish.
          HOMEBREW_TAP_TOKEN: ''
          SCOOP_GITHUB_TOKEN: ''
      # goreleaser's signs config already ran cosign during the snapshot build —
      # that IS the path under test. Verify the bundle it produced.
      - name: verify the goreleaser-produced signature bundle
        run: |
          set -euo pipefail
          cosign version
          checksums=$(ls dist/*checksums.txt)
          test -s "${checksums}.sigstore.json" || { echo "::error::goreleaser produced no signature bundle"; exit 1; }
          cosign verify-blob \
            --bundle "${checksums}.sigstore.json" \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${checksums}"
          echo "cosign keyless sign + verify OK"
