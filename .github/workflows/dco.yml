# Verifies every commit in a pull request carries a Developer Certificate of
# Origin sign-off (a `Signed-off-by:` trailer). The sign-off is the author's
# assertion that they wrote the contribution and are authorized to submit it
# under the project's license — see CONTRIBUTING.md and https://developercertificate.org/.
name: dco

on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: sign-off
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Check out the PR range
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Require Signed-off-by on every commit
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          for sha in $(git rev-list "$BASE..$HEAD"); do
            # Require at least one Signed-off-by trailer on the commit.
            if git log -1 --format='%(trailers:key=Signed-off-by,valueonly)' "$sha" | grep -q '.'; then
              continue
            fi
            echo "::error::commit $sha is missing a Signed-off-by line"
            git log -1 --format='  %h %s' "$sha"
            missing=1
          done
          if [ "$missing" -ne 0 ]; then
            echo
            echo "Add sign-off by committing with: git commit -s"
            echo "Fix an existing branch with:      git rebase --signoff $BASE"
            exit 1
          fi
          echo "All commits are signed off."
