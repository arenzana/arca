name: pages

on:
  push:
    branches: [main]
    paths: ['docs/**', '.github/workflows/pages.yml']
  pull_request:
    paths: ['docs/**', '.github/workflows/pages.yml']
  workflow_dispatch:

# Least privilege by default; the deploy job elevates only what Pages needs.
permissions:
  contents: read

# One deploy at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: tools/docsgen/go.mod
          cache-dependency-path: tools/docsgen/go.sum
      - name: render docs (md -> html)
        run: go -C tools/docsgen run . -root ../..
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: htmlhint
        run: npx --yes htmlhint@1.1.4 "docs/**/*.html"
      - name: link check (local assets)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # --offline verifies relative links/assets exist without flaky network checks.
          args: --offline --verbose docs/*.html
          fail: true

  deploy:
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write # publish to GitHub Pages
      id-token: write # OIDC for the Pages deployment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: tools/docsgen/go.mod
          cache-dependency-path: tools/docsgen/go.sum
      - name: render docs (md -> html)
        run: go -C tools/docsgen run . -root ../..
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
