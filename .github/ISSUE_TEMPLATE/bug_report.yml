name: Bug report
description: Report a problem with arca
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "⚠️ Do not paste secret values, private keys, or your store/audit files."
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal sequence of commands that reproduces the problem.
  - type: input
    id: version
    attributes:
      label: arca version
      description: Output of `arca --version`.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / architecture
      placeholder: e.g. macOS 15 arm64, Ubuntu 24.04 amd64, Windows 11 amd64
    validations:
      required: true
