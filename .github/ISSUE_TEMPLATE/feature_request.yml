name: Feature request
description: Suggest an idea or improvement for arca
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that arca doesn't support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like arca to do? Sketch the command/flags if you can.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
