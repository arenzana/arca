version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ['*']
  # tools/docsgen is its own module (the md→html renderer the pages workflow runs); without
  # this entry its dependencies never get bumped.
  - package-ecosystem: gomod
    directory: /tools/docsgen
    schedule:
      interval: weekly
    groups:
      docsgen-deps:
        patterns: ['*']
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      # Multi-step actions (e.g. codeql-action init/analyze) must bump atomically:
      # mixed major versions across steps fail at runtime.
      gh-actions:
        patterns: ['*']
