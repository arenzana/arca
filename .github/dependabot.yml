version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ['*']
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      # Multi-step actions (e.g. codeql-action init/analyze) must bump atomically:
      # mixed major versions across steps fail at runtime.
      gh-actions:
        patterns: ['*']
