version: 2
project_name: arca

before:
  hooks:
    # No `go mod tidy` here — it can mutate go.mod/go.sum at release time; `verify` confirms the
    # committed modules match what CI tested.
    - go mod verify

builds:
  - id: arca
    main: .
    binary: arca
    env:
      - CGO_ENABLED=0          # pure Go (modernc sqlite) → static, reproducible
    flags:
      - -trimpath
    ldflags:
      - -s -w -buildid= -X main.version={{ .Version }}
    mod_timestamp: '{{ .CommitTimestamp }}'   # reproducible timestamps
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - formats: [tar.gz]
    # Pin every archive entry's modification time to the commit date so the tar headers are
    # deterministic. Without this, mod_timestamp only fixes the compiled binary; the bundled
    # LICENSE/README/CHANGELOG take their on-disk (checkout wall-clock) mtime, making the .tar.gz
    # non-reproducible — two runs of the same commit produced different archive checksums, which
    # let a duplicate release run diverge the GitHub release from the Homebrew cask.
    builds_info:
      mtime: '{{ .CommitDate }}'
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    # Windows users expect zip, not tar.gz.
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

# CycloneDX SBOM per released archive (uses syft).
sboms:
  - artifacts: archive

# Keyless (Sigstore/Fulcio) signature over the checksums file; verifying it
# verifies every artifact via the checksums. Cosign v3 emits a single
# sigstore.json bundle (signature + certificate + Rekor proof); the old
# --output-signature/--output-certificate flags are ignored under v3's
# default bundle format and the sign fails without --bundle.
signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    signature: '${artifact}.sigstore.json'
    args:
      - sign-blob
      - --yes
      - --bundle=${signature}
      - ${artifact}

homebrew_casks:
  - name: arca
    repository:
      owner: arenzana
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    # Publish only when the tap token is present; without it the cask is built but not pushed, so
    # a release missing the secret still succeeds.
    skip_upload: '{{ if .Env.HOMEBREW_TAP_TOKEN }}false{{ else }}true{{ end }}'
    homepage: "https://github.com/arenzana/arca"
    description: "age-encrypted, file-based secrets manager built to sit safely in front of AI agents"
    # The binaries are cosign-signed but not Apple-notarized; strip the quarantine attribute so
    # Gatekeeper doesn't block the cask-installed binary.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/arca"]
          end

scoops:
  - repository:
      owner: arenzana
      name: scoop-bucket
      token: "{{ .Env.SCOOP_GITHUB_TOKEN }}"
    # Publish only when the bucket token is present; otherwise the manifest is built but not
    # pushed, so a release missing the secret still succeeds.
    skip_upload: '{{ if .Env.SCOOP_GITHUB_TOKEN }}false{{ else }}true{{ end }}'
    homepage: "https://github.com/arenzana/arca"
    description: "age-encrypted, file-based secrets manager built to sit safely in front of AI agents"
    license: MIT

release:
  prerelease: auto
  # Create as a draft so every asset (archives, checksums, signatures, SBOMs) is
  # attached BEFORE the release is published. With immutable releases enabled, a
  # release locks on publish — the CI workflow flips the draft to published only
  # after all uploads + attestations complete.
  draft: true
